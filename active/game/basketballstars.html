<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>space hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: black; /* Entire background set to black */
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      z-index: -1; /* Ensures iframe stays behind the buttons and content */
    }

    .button-container {
      display: flex;
      align-items: center;
      background-color: black; /* Button section background is black */
      padding: 20px;
      border-radius: 10px;
      width: 100%;
      justify-content: center;
      z-index: 1; /* Ensures buttons are on top */
      transition: opacity 0.3s ease; /* Smooth fade out/in */
    }

    .fullscreen-button {
      padding: 15px 30px;
      background-color: #333; /* Default gray color */
      color: #6a1b9a; /* Nebula purple text */
      border: none;
      cursor: pointer;
      font-size: 18px;
      border-radius: 25px; /* Round corners */
      transition: all 0.3s ease;
      box-shadow: 0 0 5px #6a1b9a; /* Glowing effect */
    }

    .fullscreen-button:hover {
      background-color: #f0f0f0; /* Light gray background on hover */
      box-shadow: 0 0 15px 5px #6a1b9a; /* Neon purple glow around the button */
    }

    .fullscreen-button:active {
      background-color: #ccc; /* Darker gray on click */
    }

    .fullscreen-button span {
      text-shadow: 0 0 10px #6a1b9a, 0 0 20px #6a1b9a; /* Glowing text */
    }

    .game-description {
      color: white; /* White text */
      font-family: 'Jua', sans-serif;
      font-size: 20px;
      margin-left: 20px; /* Space between the button and text */
      max-width: 400px;
      text-align: left;
      background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent black background for the description */
      padding: 15px; /* Some padding around the text */
      border-radius: 10px; /* Optional rounded corners for the description box */
    }

    .fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: black;
      z-index: 999; /* Ensures everything stays on top in fullscreen */
    }
  </style>
</head>
<body>

  <div class="container" id="container">
    <iframe src="https://classroom6x.gitlab.io/basketball-stars" id="embed"></iframe>
    <div class="button-container" id="buttonContainer">
      <button class="fullscreen-button" id="fullscreenBtn"><span>Fullscreen</span></button>
      <div class="game-description">
        <p>A fun basket ball game to play with friends or alone!</p>
      </div>
    </div>
  </div>

  <script>
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const buttonContainer = document.getElementById('buttonContainer');
    const container = document.getElementById('container');
    const embed = document.getElementById('embed');

    fullscreenBtn.addEventListener('click', function() {
      if (!document.fullscreenElement) {
        container.requestFullscreen(); // Request fullscreen for the entire container
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    });

    // Listen for when the fullscreen mode changes
    document.addEventListener('fullscreenchange', function() {
      if (document.fullscreenElement) {
        // Hide button container when fullscreen is active
        buttonContainer.style.opacity = 0;
      } else {
        // Show button container when exiting fullscreen
        buttonContainer.style.opacity = 1;
      }
    });
  </script>
  
</body>
</html>
