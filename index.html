<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Detection</title>
    <script>
        function detectDevice() {
            let userAgent = navigator.userAgent.toLowerCase();
            
            // Check if the device is a Chromebook (ChromeOS)
            let isChromebook = userAgent.includes("cros");

            // If it's NOT a Chromebook, redirect to Cool Math Games
            if (!isChromebook) {
                window.location.href = "https://www.coolmathgames.com/";
            } else {
                // If it IS a Chromebook, redirect to "active/"
                window.location.href = "active/index.html"; // Change this to your desired Chromebook page
            }
        }

        // Run the function when the page loads
        window.onload = detectDevice;
    </script>
</head>
<body>
    <h1>Redirecting...</h1>
    <p>If you are not redirected, <a href="active/">click here</a>.</p>
</body>
</html>
