<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Detection</title>
    <script>
        function detectDevice() {
            let userAgent = navigator.userAgent.toLowerCase();
            
            // Check if the device is a MacBook (macOS)
            let isMac = userAgent.includes("macintosh");

            // If it's a MacBook, redirect to Cool Math Games
            if (isMac) {
                window.location.href = "https://www.coolmathgames.com/";
            } else {
                // Otherwise, allow access
                window.location.href = "active/index.html"; // Change this to your desired page
            }
        }

        // Run the function when the page loads
        window.onload = detectDevice;
    </script>
</head>
<body>
    <h1>Redirecting...</h1>
    <p>If you are not redirected, <a href="active/">click here</a>.</p>
</body>
</html>
